version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: rar2zip
    main: .
    binary: rar2zip
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

archives:
  - id: rar2zip
    builds: [rar2zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: rar2zip
    # Skip publishing to tap when token is not configured.
    skip_upload: "{{ if eq .Env.HOMEBREW_TAP_TOKEN \"\" }}true{{ end }}"
    repository:
      owner: ongtungduong
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/ongtungduong/rar2zip"
    description: "Convert RAR archives to ZIP — pure-Go, no unrar required"
    license: "MIT"
    install: |
      bin.install "rar2zip"
    test: |
      system "#{bin}/rar2zip", "--version"
