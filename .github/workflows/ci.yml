name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: test / ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            goarch: amd64
          - os: linux
            runner: ubuntu-24.04-arm
            goarch: arm64
          - os: darwin
            runner: macos-latest
            goarch: amd64
          - os: darwin
            runner: macos-latest
            goarch: arm64
          # Windows is experimental and build-only: the fallback tests shell out
          # to unrar/7z and create symlinks, which are Unix-only. vet/fmt/build
          # still run (they compile the windows build variant), so a broken
          # Windows build is caught — but the test suite is not run here.
          - os: windows
            runner: windows-latest
            goarch: amd64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: fmt check
        if: matrix.os != 'windows'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "unformatted files: $unformatted"
            exit 1
          fi

      - name: test
        if: matrix.os != 'windows'
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go test ./...

      - name: build
        # `go build ./...` compiles every package for the target GOOS/GOARCH and
        # discards the output — a cross-platform compile check (no /dev/null,
        # which Windows lacks).
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
