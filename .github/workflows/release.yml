name: Release

on:
  push:
    tags:
      - "v*"

# Default every job to read-only; the release job opts into the extra scopes it
# needs (below). This keeps the broad token off jobs that don't release.
permissions:
  contents: read

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload assets
      id-token: write # keyless cosign signing via the OIDC token (no stored keys)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # Provides the `cosign` binary that goreleaser's signs block invokes to
      # keylessly sign checksums.txt (authenticity, in addition to integrity).
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the cosign BINARY to the 2.x line. cosign 3.x (installed by
          # cosign-installer v4) removed the legacy detached sign-blob flow:
          # --output-signature/--output-certificate now require the new bundle
          # format / signing-config, which breaks our signs block and
          # install.sh's verify-blob --signature/--certificate. The installer
          # action version is independent of the cosign binary it installs, so
          # pinning the binary keeps signing stable across action bumps.
          cosign-release: v2.6.3

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          # Pin the goreleaser binary to an exact version (not a floating range)
          # so a release is reproducible and not silently moved by a new release.
          version: "v2.16.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: a fine-grained PAT scoped to ONLY the homebrew-tap repo with
          # contents:write. If unset, goreleaser skips the brew/scoop tap push.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || '' }}
          SCOOP_TAP_TOKEN: ${{ secrets.SCOOP_TAP_TOKEN || '' }}
