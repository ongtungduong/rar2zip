version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current: Dependabot opens PRs that bump
  # the pin to the new commit SHA (and the # vX.Y.Z comment), so pinning does
  # not mean going stale.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Go module updates (e.g. rardecode) on the same cadence.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
